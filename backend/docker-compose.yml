services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio:portfolio@db:5432/portfolio
      STATIC_DIR: /dist
      JWT_SECRET: change-me-dev
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
    volumes:
      - ../frontend/dist:/dist:ro

volumes:
  pgdata:
